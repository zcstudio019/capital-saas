{% extends 'base.html' %}{% block content %}<section class="admin-shell container"><h1>修改密码</h1>{% if error %}<div class="alert danger">{{ error }}</div>{% endif %}<form class="card detail-card" method="post"><label>当前密码<input type="password" name="current_password" required></label><label>新密码<input type="password" name="new_password" minlength="10" required></label><p>至少10位，不得使用默认密码。修改后其他会话将失效。</p><button class="btn btn-primary">保存新密码</button></form></section>{% endblock %}
