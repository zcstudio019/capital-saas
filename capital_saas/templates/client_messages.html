{% extends 'client_base.html' %}{% block content %}<h1>消息中心</h1><section class="client-card">{% for m in messages %}<a class="client-row" href="/client/messages/{{ m.id }}"><div><b>{{ m.title }}</b><p>{{ m.content[:80] }}</p></div><span>{{ '未读' if m.status=='unread' else m.created_at.strftime('%m-%d') }}</span></a>{% else %}<p class="empty">暂无消息</p>{% endfor %}</section>{% endblock %}
