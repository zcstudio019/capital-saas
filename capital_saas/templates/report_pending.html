{% extends "base.html" %}
{% block title %}报告复核中{% endblock %}
{% block content %}
<section class="error-page"><div class="card">
  {% if quality_failed %}
    <h1>报告正在重新整理，请稍后查看</h1>
    <p>系统正在完成交付质量检查，整理完成后将更新为正式报告。</p>
  {% else %}
    <h1>方案正在由融资顾问复核</h1>
    <p>{{ assessment.company_name }} 的融资产品、额度口径和行动方案正在进行人工复核，完成后将通知您。</p>
    <p>当前状态：待审核</p>
  {% endif %}
  <a class="btn btn-primary" href="/">返回首页</a>
</div></section>
{% endblock %}
