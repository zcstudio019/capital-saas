{% extends 'client_base.html' %}{% block content %}<h1>通知偏好</h1><form class="client-card client-form" method="post" action="/client/preferences/update"><label><span><input type="checkbox" name="receive_in_app" value="true" {{ 'checked' if preference.receive_in_app else '' }}> 接收站内服务通知</span></label><label><span><input type="checkbox" name="receive_sms" value="true" {{ 'checked' if preference.receive_sms else '' }}> 接收短信通知（当前为模拟通道）</span></label><label><span><input type="checkbox" name="receive_email" value="true" {{ 'checked' if preference.receive_email else '' }}> 接收邮件通知（当前为模拟通道）</span></label><label><span><input type="checkbox" name="is_unsubscribed" value="true" {{ 'checked' if preference.is_unsubscribed else '' }}> 不接收营销升级推荐</span></label><label>勿扰开始<input type="time" name="quiet_hours_start" value="{{ preference.quiet_hours_start }}"></label><label>勿扰结束<input type="time" name="quiet_hours_end" value="{{ preference.quiet_hours_end }}"></label><p>项目进度、资料补充和确认回执等必要服务通知仍会保留在门户内。</p><button class="btn btn-gold">保存设置</button></form>{% endblock %}
