{% extends 'base.html' %}{% block title %}提成规则{% endblock %}{% block content %}<section class="admin-shell container"><h1>提成规则</h1>{% for r in rules %}<div class="card revenue-row"><span>{{ r.rule_name }} · {{ r.trigger_event }} · {{ r.product_code|product_label }}</span><strong>{{ r.commission_type }} {{ r.commission_value }}</strong></div>{% endfor %}<form class="card detail-card inline-add-form" method="post" action="/admin/commission-rules/create"><input name="rule_name" required><input name="role_type" value="sales"><input name="product_code"><select name="trigger_event"><option>paid_order</option><option>project_disbursed</option></select><select name="commission_type"><option>fixed_amount</option><option>percentage</option></select><input type="number" step="0.01" name="commission_value"><button class="btn">创建</button></form></section>{% endblock %}
