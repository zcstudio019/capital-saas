{% extends 'base.html' %}{% block content %}<section class="admin-shell container"><h1>我的通知偏好</h1><form class="card detail-card" method="post" action="/admin/my-notification-preferences/update"><label><input type="checkbox" name="receive_in_app" value="true" {{ 'checked' if preference.receive_in_app else '' }}> 站内通知</label><label><input type="checkbox" name="receive_email" value="true" {{ 'checked' if preference.receive_email else '' }}> 邮件通知</label><label><input type="checkbox" name="receive_wecom" value="true" {{ 'checked' if preference.receive_wecom else '' }}> 企业微信Webhook</label><label>勿扰开始<input type="time" name="quiet_hours_start" value="{{ preference.quiet_hours_start }}"></label><label>勿扰结束<input type="time" name="quiet_hours_end" value="{{ preference.quiet_hours_end }}"></label><button class="btn btn-primary">保存偏好</button></form></section>{% endblock %}
