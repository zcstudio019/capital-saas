{% extends 'base.html' %}
{% block title %}问题详情{% endblock %}
{% block content %}
<section class="admin-shell container">
  <h1>{{ item.title }}</h1>
  <section class="card">
    <p>{{ item.description }}</p>
    <p class="muted">{{ item.issue_type|zh }} · {{ item.source|zh }} · {{ item.severity|zh }} · {{ item.status|zh }}</p>
    {% if can_edit %}
    <form method="post" action="/admin/issues/{{ item.id }}/update" class="form-grid">
      <label>状态
        <select name="status">
          <option value="open">待处理</option>
          <option value="in_progress">处理中</option>
          <option value="resolved">已解决</option>
          <option value="closed">已关闭</option>
          <option value="won't_fix">暂不处理</option>
        </select>
      </label>
      <label>严重度
        <select name="severity">
          <option value="{{ item.severity }}">{{ item.severity|zh }}</option>
          <option value="low">低</option>
          <option value="medium">中</option>
          <option value="high">高</option>
          <option value="critical">严重</option>
        </select>
      </label>
      <label>分配人ID<input name="assigned_to" type="number" value="{{ item.assigned_to or 0 }}"></label>
      <label class="full">解决备注<textarea name="resolution_note">{{ item.resolution_note }}</textarea></label>
      <button class="btn btn-primary">保存</button>
    </form>
    {% endif %}
  </section>
</section>
{% endblock %}
