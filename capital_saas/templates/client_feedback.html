{% extends 'client_base.html' %}{% block title %}提交反馈{% endblock %}
{% block content %}<section class="client-card"><h1>提交反馈/遇到问题</h1><form method="post" action="/client/feedback/submit" class="form-grid"><label>类型<select name="feedback_type"><option value="report_quality">报告质量</option><option value="payment">支付问题</option><option value="document_upload">资料上传</option><option value="project_progress">项目进度</option><option value="advisor_service">顾问服务</option><option value="usability">使用体验</option><option value="other">其他</option></select></label><label>评分<input name="rating" type="number" min="1" max="5" value="5"></label><label class="full">标题<input name="title" required></label><label class="full">内容<textarea name="content"></textarea></label><label class="full">页面链接<input name="page_url" placeholder="可选"></label><button class="btn btn-primary">提交反馈</button></form></section><section class="client-card"><h2>我的反馈</h2>{% for item in items %}<div class="client-row"><b>{{item.title}}</b><span>{{ item.status|zh }} · {{ item.rating }}分</span></div>{% else %}<p class="muted">暂无反馈</p>{% endfor %}</section>{% endblock %}
