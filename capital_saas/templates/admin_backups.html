{% extends 'base.html' %}{% block content %}<section class="admin-shell container"><div class="admin-top"><h1>数据库备份</h1><form method="post" action="/admin/backups/create"><button class="btn btn-primary">立即创建一致性备份</button></form></div><div class="alert">恢复操作不在网页执行。请停机、校验SHA-256后由运维人员恢复，避免误覆盖生产数据。</div><div class="card table-card"><table><thead><tr><th>文件</th><th>大小</th><th>时间</th><th>SHA-256</th><th>操作</th></tr></thead><tbody>{% for x in items %}<tr><td>{{ x.name }}</td><td>{{ x.size }}</td><td>{{ x.created_at }}</td><td><code>{{ x.sha256 }}</code></td><td><a href="/admin/backups/{{ x.name }}/download">下载</a><form method="post" action="/admin/backups/{{ x.name }}/delete"><button>删除</button></form></td></tr>{% else %}<tr><td colspan="5">暂无备份</td></tr>{% endfor %}</tbody></table></div></section>{% endblock %}
