{% extends 'base.html' %}{% block title %}试运营日报{% endblock %}{% block content %}<section class="admin-shell container"><h1>试运营日报</h1><section class="card"><form method="post" action="/admin/daily-reports/generate" class="form-inline"><input type="date" name="report_date"><select name="pilot_batch_id"><option value="0">全部批次</option>{% for b in batches %}<option value="{{b.id}}">{{b.batch_name}}</option>{% endfor %}</select><button class="btn btn-primary">生成日报</button></form></section><section class="card">{% for item in items %}<div class="client-row"><b><a href="/admin/daily-reports/{{item.id}}">{{item.report_date.date()}}</a></b><span>测评{{item.assessments_count}} · 付费{{item.paid_orders_count}} · 收入{{item.revenue}}</span></div>{% else %}<p class="muted">暂无日报</p>{% endfor %}</section></section>{% endblock %}
