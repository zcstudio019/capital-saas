{% extends "base.html" %}
{% block title %}系统设置｜沪上银{% endblock %}
{% block content %}
<section class="admin-shell container">
  <div class="admin-top"><div><div class="eyebrow">系统配置</div><h1>运营设置中心</h1></div><a class="btn" href="/admin">返回后台</a></div>
  <form class="card detail-card settings-form" method="post" action="/admin/settings">
    <h2>基础运营配置</h2>
    <label>网站名称<input name="site_name" value="{{ settings.site_name }}"></label>
    <label>公司名称<input name="company_name" value="{{ settings.company_name }}"></label>
    <label>联系电话<input name="contact_phone" value="{{ settings.contact_phone }}"></label>
    <label>联系微信<input name="contact_wechat" value="{{ settings.contact_wechat }}"></label>
    <label>299产品价格<input name="report_price_299" type="number" min="0" value="{{ settings.report_price_299 }}"></label>
    <label>699产品价格<input name="report_price_699" type="number" min="0" value="{{ settings.report_price_699 }}"></label>
    <label>1999产品价格<input name="report_price_1999" type="number" min="0" value="{{ settings.report_price_1999 }}"></label>
    <h2>企业资本健康体检报告配置</h2>
    <label>企业资本健康体检报告价格<input name="capital_health_report_price" type="number" min="0" value="{{ settings.capital_health_report_price }}"></label>
    <label>融资结构优化方案价格<input name="capital_structure_plan_price" type="number" min="0" value="{{ settings.capital_structure_plan_price }}"></label>
    <label>1对1顾问服务起价<input name="one_on_one_consulting_price" type="number" min="0" value="{{ settings.one_on_one_consulting_price }}"></label>
    <label>体检机构名称<input name="capital_health_institution" value="{{ settings.capital_health_institution }}"></label>
    <label>报告有效期（天）<input name="capital_health_report_validity_days" type="number" min="1" value="{{ settings.capital_health_report_validity_days }}"></label>
    <label>显示英文副标题<select name="capital_health_show_english_subtitle"><option value="true" {{ 'selected' if settings.capital_health_show_english_subtitle == 'true' else '' }}>显示</option><option value="false" {{ 'selected' if settings.capital_health_show_english_subtitle != 'true' else '' }}>隐藏</option></select></label>
    <label>1999升级计价<select name="structure_plan_upgrade_mode"><option value="deduct_report_price" {{ 'selected' if settings.structure_plan_upgrade_mode == 'deduct_report_price' else '' }}>抵扣已购980报告</option><option value="full_price" {{ 'selected' if settings.structure_plan_upgrade_mode == 'full_price' else '' }}>支付完整1999元</option></select></label>
    <label>旧299权益策略<select name="legacy_299_upgrade_policy"><option value="keep_legacy_rights" {{ 'selected' if settings.legacy_299_upgrade_policy == 'keep_legacy_rights' else '' }}>保留历史权益</option><option value="grant_980_rights" {{ 'selected' if settings.legacy_299_upgrade_policy == 'grant_980_rights' else '' }}>赋予980报告权益</option></select></label>
    <label>980元体检报告审核策略<select name="review_980_required"><option value="false" {{ 'selected' if settings['980_report_review_required'] != 'true' else '' }}>支付后自动交付（默认）</option><option value="true" {{ 'selected' if settings['980_report_review_required'] == 'true' else '' }}>审核通过后交付</option></select></label>
    <label>1999元优化方案审核策略<select name="review_1999_required"><option value="true" {{ 'selected' if settings['1999_plan_review_required'] == 'true' else '' }}>必须人工审核（默认）</option><option value="false" {{ 'selected' if settings['1999_plan_review_required'] != 'true' else '' }}>生成成功后自动通过</option></select></label>
    <label>智能报告模式<select name="ai_mode"><option value="mock" {{ 'selected' if settings.ai_mode == 'mock' else '' }}>模拟模式</option><option value="openai" {{ 'selected' if settings.ai_mode == 'openai' else '' }}>在线智能模型</option></select></label>
    <label>智能模型名称<input name="openai_model" value="{{ settings.openai_model }}"></label>
    <label>支付模式<select name="payment_mode">{% for mode in ['mock','manual_transfer','wechat_pay','alipay'] %}<option value="{{ mode }}" {{ 'selected' if settings.payment_mode == mode else '' }}>{{ mode|zh }}</option>{% endfor %}</select></label>
    <label>允许注册<select name="enable_registration"><option value="false" {{ 'selected' if settings.enable_registration != 'true' else '' }}>关闭</option><option value="true" {{ 'selected' if settings.enable_registration == 'true' else '' }}>开启</option></select></label>
    <label>报告人工审核<select name="report_review_required"><option value="false" {{ 'selected' if settings.report_review_required != 'true' else '' }}>关闭</option><option value="true" {{ 'selected' if settings.report_review_required == 'true' else '' }}>开启</option></select></label>
    <label>单文件上传上限（兆字节）<input name="upload_max_mb" type="number" min="1" max="100" value="{{ settings.upload_max_mb }}"></label>
    <button class="btn btn-primary" type="submit">保存配置</button>
  </form>
</section>
{% endblock %}
