{% extends 'base.html' %}{% block content %}<section class="admin-shell container"><h1>法律文档与隐私协议</h1>{% for x in items %}<form class="card detail-card" method="post" action="/admin/legal-documents/{{ x.id }}/update"><h2>{{ x.document_key }}</h2><label>标题<input name="title" value="{{ x.title }}"></label><label>版本<input name="version" value="{{ x.version }}"></label><label><input type="checkbox" name="is_active" value="true" {{ 'checked' if x.is_active else '' }}> 启用</label><label class="wide">正文<textarea name="content" rows="8">{{ x.content }}</textarea></label><button class="btn btn-primary">保存</button></form>{% endfor %}</section>{% endblock %}
