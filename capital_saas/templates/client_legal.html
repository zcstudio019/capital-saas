{% extends 'client_base.html' %}{% block content %}<h1>协议与数据授权</h1><p>首次使用服务前，请阅读并确认以下文件。</p>{% for x in documents %}<section class="client-card"><h2>{{ x.title }}</h2><div class="message-content">{{ x.content }}</div><p>版本：{{ x.version }}</p>{% if (x.document_key,x.version) in accepted %}<strong>已确认</strong>{% else %}<form method="post" action="/client/legal/{{ x.id }}/accept"><button class="btn btn-gold">我已阅读并同意</button></form>{% endif %}</section>{% endfor %}{% endblock %}
