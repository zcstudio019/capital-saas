{% extends 'base.html' %}{% block title %}试运营周报{% endblock %}{% block content %}<section class="admin-shell container"><h1>试运营周报</h1><section class="card"><form method="post" action="/admin/weekly-reports/generate" class="form-inline"><input type="date" name="week_start"><select name="pilot_batch_id"><option value="0">全部批次</option>{% for b in batches %}<option value="{{b.id}}">{{b.batch_name}}</option>{% endfor %}</select><button class="btn btn-primary">生成周报</button></form></section><section class="card">{% for item in items %}<div class="client-row"><b><a href="/admin/weekly-reports/{{item.id}}">{{item.week_start.date()}} - {{item.week_end.date()}}</a></b><span>测评{{item.total_assessments}} · 付费{{item.total_paid_orders}} · 收入{{item.total_revenue}}</span></div>{% else %}<p class="muted">暂无周报</p>{% endfor %}</section></section>{% endblock %}
