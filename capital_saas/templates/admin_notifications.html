{% extends 'base.html' %}{% block content %}<section class="admin-shell container"><div class="admin-top"><h1>我的通知</h1><div class="admin-links"><a href="/admin/notifications?unread=1">只看未读</a><a href="/admin/my-notification-preferences">通知偏好</a><form method="post" action="/admin/notifications/read-all"><button class="btn">全部已读</button></form></div></div><section class="card">{% for n in items %}<div class="client-row"><div><b>{{ n.title }}</b><p>{{ n.content }}</p><small>{{ n.created_at.strftime('%Y-%m-%d %H:%M') }}</small></div>{% if n.status=='unread' %}<form method="post" action="/admin/notifications/{{ n.id }}/read"><button class="btn">标记已读</button></form>{% else %}<span>已读</span>{% endif %}</div>{% else %}<p class="empty">暂无内部通知</p>{% endfor %}</section></section>{% endblock %}
