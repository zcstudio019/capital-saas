services:
  capital-saas:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/capital_saas.db
      APP_ENV: production
    volumes:
      - capital_saas_data:/app/data
      - capital_saas_logs:/app/logs

volumes:
  capital_saas_data:
  capital_saas_logs:

